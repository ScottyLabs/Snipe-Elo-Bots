# https://docs.railway.app/deploy/config-as-code
[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
# Select bot entrypoint per service with BOT_PLATFORM:
# - BOT_PLATFORM=slack   -> dist/index.js
# - BOT_PLATFORM=discord -> dist/indexDiscord.js
# Defaults to Slack when unset.
startCommand = "sh -lc 'if [ \"$BOT_PLATFORM\" = \"discord\" ]; then node dist/indexDiscord.js; else node dist/index.js; fi'"
